<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo quadrado verde brand com cantos arredondados -->
  <rect width="512" height="512" fill="#0A6640" rx="96"/>
  <!-- Letra "C" da marca em branco, centralizada -->
  <text
    x="256" y="370"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="360" font-weight="800"
    text-anchor="middle" fill="#FFFFFF"
    letter-spacing="-12">C</text>
  <!-- Ponto verde claro (acento da marca, igual ao logo do site) -->
  <circle cx="385" cy="365" r="40" fill="#12B870"/>
</svg>
